<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Professional Dashboard</title>
  <style>
    /* Reset & base */
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f5f7fa;
      color: #333;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    /* Layout */
    .dashboard {
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #2f3e46;
      color: white;
      padding: 25px 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 {
      margin: 0 0 40px 0;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 1.8rem;
      user-select: none;
    }
    .nav-link {
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 6px;
      color: #adb5bd;
      font-weight: 600;
      transition: background 0.3s, color 0.3s;
      cursor: pointer;
    }
    .nav-link:hover,
    .nav-link.active {
      background: #52796f;
      color: white;
    }

    /* Main content */
    .main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      padding: 25px 40px;
      background: #fff;
    }
    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
      padding-bottom: 15px;
      margin-bottom: 30px;
    }
    .search-input {
      width: 280px;
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    .search-input:focus {
      outline: none;
      border-color: #52796f;
    }
    .user-info {
      font-weight: 700;
      color: #52796f;
      user-select: none;
    }
    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 22px;
    }
    .card {
      background: #f9fafb;
      border-radius: 12px;
      padding: 25px 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: default;
      user-select: none;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }
    .card h3 {
      margin: 0 0 14px 0;
      font-size: 1.3rem;
      color: #52796f;
    }
    .card p {
      font-size: 2.3rem;
      margin: 0;
      font-weight: 700;
      color: #354f52;
    }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      .sidebar {
        display: none;
      }
      .main {
        padding: 20px;
      }
      .search-input {
        width: 100%;
      }
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <aside class="sidebar">
      <h2>MyDashboard</h2>
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Analytics</a>
      <a href="#" class="nav-link">Reports</a>
      <a href="#" class="nav-link">Settings</a>
    </aside>

    <main class="main">
      <div class="topbar">
        <input type="search" class="search-input" placeholder="Search..." />
        <div class="user-info">Hi, John Doe</div>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Total Users</h3>
          <p id="total-users">1,245</p>
        </div>
        <div class="card">
          <h3>Sales</h3>
          <p id="sales">$23,400</p>
        </div>
        <div class="card">
          <h3>New Orders</h3>
          <p id="new-orders">98</p>
        </div>
        <div class="card">
          <h3>Pending Tickets</h3>
          <p id="pending-tickets">12</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Example: Simple nav link active toggle
    const navLinks = document.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        navLinks.forEach(l => l.classList.remove('active'));
        e.target.classList.add('active');
      });
    });

    // Example: Search input (just logs input for now)
    const searchInput = document.querySelector('.search-input');
    searchInput.addEventListener('input', e => {
      console.log("Searching for:", e.target.value);
    });

    // You can add more JS for dynamic data here!
  </script>
</body>
</html>
