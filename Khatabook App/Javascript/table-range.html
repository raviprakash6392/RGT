<!DOCTYPE html>
<html>
<head>
    <title>Advanced Multiplication Table</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 25px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }
        .controls div {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        label {
            font-weight: bold;
            color: #34495e;
        }
        input, select, button {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6cqi;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        th, td {
            border: 1px solid #ecf0f1;
            padding: 10px 12px;
            text-align: center;
            transition: all 0.2s;
        }
        th {
            background-color: #3498db;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:nth-child(even) {
            background-color: #c844a0;
        }
        tr:hover td {
            background-color: #dc87d2;
            transform: scale(1.01);
        }
        .highlight {
            background-color: #598eb0 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><b><u>गुणन सारणी जनरेटर</u></b></h1>
        
        <div class="controls">
            <div>
                <label for="start">शुरूआत:</label>
                <input type="number" id="start" value="1" min="1">
            </div>
            <div>
                <label for="end">अंत:</label>
                <input type="number" id="end" value="10" min="1">
            </div>
            <div>
                <label for="columns">कॉलम:</label>
                <input type="number" id="columns" value="20" min="1" max="30">
            </div>
            <div>
                <label for="theme">थीम:</label>
                <select id="theme">
                    <option value="blue">नीला</option>
                    <option value="green">हरा</option>
                    <option value="red">लाल</option>
                    <option value="purple">बैंगनी</option>
                </select>
            </div>
            <button onclick="generateTable()">तालिका बनाएं</button>
        </div>
        
        <div id="tableContainer"></div>
    </div>

    <script>
        function generateTable() {
            const start = parseInt(document.getElementById('start').value);
            const end = parseInt(document.getElementById('end').value);
            const columns = parseInt(document.getElementById('columns').value);
            const theme = document.getElementById('theme').value;
            
            // Theme colors
            const themes = {
                blue: { header: '#3498db', hover: '#e3f2fd' },
                green: { header: '#2ecc71', hover: '#e8f5e9' },
                red: { header: '#e74c3c', hover: '#ffebee' },
                purple: { header: '#9b59b6', hover: '#f3e5f5' }
            };
            
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>×</th>`;
            
            // Add column headers
            for (let i = 1; i <= columns; i++) {
                tableHTML += `<th>${i}</th>`;
            }
            tableHTML += `</tr></thead><tbody>`;
            
            // Add table rows
            for (let a = start; a <= end; a++) {
                tableHTML += `<tr><td><strong>${a}</strong></td>`;
                
                for (let i = 1; i <= columns; i++) {
                    const product = a * i;
                    // Highlight perfect squares
                    const isPerfectSquare = Math.sqrt(product) % 1 === 0;
                    tableHTML += `<td class="${isPerfectSquare ? 'highlight' : ''}">${product}</td>`;
                }
                
                tableHTML += `</tr>`;
            }
            
            tableHTML += `</tbody></table>`;
            
            // Apply theme
            document.documentElement.style.setProperty('--header-color', themes[theme].header);
            document.documentElement.style.setProperty('--hover-color', themes[theme].hover);
            
            document.getElementById('tableContainer').innerHTML = tableHTML;
            
            // Add hover effect to cells
            const cells = document.querySelectorAll('td');
            cells.forEach(cell => {
                cell.addEventListener('mouseenter', function() {
                    const row = this.parentNode;
                    const colIndex = this.cellIndex;
                    
                    // Highlight entire row and column
                    const rows = document.querySelectorAll('tr');
                    rows.forEach(r => {
                        r.cells[colIndex]?.classList.add('highlight');
                    });
                    [...row.cells].forEach(c => c.classList.add('highlight'));
                });
                
                cell.addEventListener('mouseleave', function() {
                    const highlighted = document.querySelectorAll('.highlight');
                    highlighted.forEach(el => {
                        if (!el.classList.contains('perfect-square')) {
                            el.classList.remove('highlight');
                        }
                    });
                });
            });
        }
        
        // Generate table on page load
        window.onload = generateTable;
    </script>
</body>
</html>
